name: Build Windows Installer

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 📥 拉取代码
      uses: actions/checkout@v3

    - name: 🐍 安装 Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.7'

    - name: 📦 安装依赖
      run: pip install pyinstaller PyQt5 matplotlib python-docx requests

    - name: 🔨 打包 EXE
      run: pyinstaller -F -w -n AI学情分析系统 --hidden-import=PyQt5.sip --add-data "students.json;." --add-data "users.json;." --add-data "data.json;." --add-data "user.db;." AI学情分析系统.py

    - name: 📦 安装 Inno Setup
      run: choco install innosetup -y

    - name: 🏗 生成安装包脚本
      run: |
        echo [Setup] > setup.iss
        echo AppName=AI学情分析系统 >> setup.iss
        echo AppVersion=1.0 >> setup.iss
        echo DefaultDirName={pf}\AI学情分析系统 >> setup.iss
        echo OutputDir=installer >> setup.iss
        echo OutputBaseFilename=安装包 >> setup.iss

        echo [Files] >> setup.iss
        echo Source: "dist\AI学情分析系统.exe"; DestDir: "{app}" >> setup.iss

        echo [Icons] >> setup.iss
        echo Name: "{group}\AI学情分析系统"; Filename: "{app}\AI学情分析系统.exe" >> setup.iss

    - name: 🚀 编译安装包
      run: iscc setup.iss

    - name: 📤 上传安装包
      uses: actions/upload-artifact@v4
      with:
        name: 安装包
        path: installer/
